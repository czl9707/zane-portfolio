name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --outDir out
        env:
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_APIKEY: ${{ secrets.ADMIN_APIKEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4